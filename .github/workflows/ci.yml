name: O Aisthetikos CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Install krizziaci dependencies
        working-directory: krizziaci
        run: npm ci

      - name: Run krizziaci pipeline
        run: node krizziaci/bin/krizziaci.js run --repo .

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Upload pipeline evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: krizziaci-evidence
          path: |
            .krizziaci/history.json
            .krizziaci/logs/
          if-no-files-found: ignore
